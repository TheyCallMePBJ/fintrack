<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goals | FinTrack</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --black:#0a0a0a; --white:#ffffff; --bg:#f5f5f5; --border:#e2e2e2; --muted:#737373; --card:#ffffff; --green:#16a34a; --red:#dc2626; --amber:#d97706; }
        body { font-family:'Syne',sans-serif; background:var(--bg); color:var(--black); line-height:1.5; }
        header { background:var(--black); color:var(--white); padding:0 2.5rem; height:52px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:10; }
        .logo { font-size:0.95rem; font-weight:600; letter-spacing:-0.01em; }
        nav { display:flex; gap:0.25rem; }
        nav a { color:rgba(255,255,255,0.55); text-decoration:none; font-size:0.82rem; font-weight:500; padding:0.35rem 0.75rem; border-radius:4px; transition:color 0.15s,background 0.15s; }
        nav a:hover { color:var(--white); background:rgba(255,255,255,0.08); }
        nav a.active { color:var(--white); }
        nav a.danger { color:rgba(255,255,255,0.4); }
        nav a.danger:hover { color:#fca5a5; background:rgba(255,255,255,0.05); }
        main { max-width:760px; margin:2.5rem auto; padding:0 2rem; }
        .page-title { font-size:1rem; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:0.06em; margin-bottom:0.4rem; }
        .page-sub { font-size:0.82rem; color:var(--muted); margin-bottom:1.75rem; }
        /* Add form */
        .add-card { background:var(--card); border:1px solid var(--border); border-radius:6px; padding:1.75rem; margin-bottom:1.25rem; }
        .section-label { font-size:0.72rem; font-weight:600; text-transform:uppercase; letter-spacing:0.07em; color:var(--muted); margin-bottom:1rem; }
        .add-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:0.85rem; margin-bottom:1rem; }
        @media(max-width:560px){ .add-grid { grid-template-columns:1fr; } }
        .fg { display:flex; flex-direction:column; }
        .fg label { font-size:0.72rem; font-weight:500; color:var(--muted); text-transform:uppercase; letter-spacing:0.05em; margin-bottom:0.35rem; }
        .fg input { padding:0.65rem 0.85rem; border:1px solid var(--border); border-radius:4px; font-size:0.9rem; font-family:'Syne',sans-serif; background:var(--bg); color:var(--black); transition:border-color 0.15s; }
        .fg input:focus { outline:none; border-color:var(--black); }
        .btn-add { padding:0.65rem 1.5rem; background:var(--black); color:var(--white); border:none; border-radius:4px; font-size:0.85rem; font-weight:500; font-family:'Syne',sans-serif; cursor:pointer; transition:opacity 0.15s; }
        .btn-add:hover { opacity:0.85; }
        /* Goal cards */
        .goals-list { display:flex; flex-direction:column; gap:1rem; }
        .goal-card { background:var(--card); border:1px solid var(--border); border-radius:6px; padding:1.5rem; }
        .goal-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:1.1rem; }
        .goal-name { font-size:1rem; font-weight:600; letter-spacing:-0.01em; }
        .goal-meta { font-size:0.78rem; color:var(--muted); margin-top:0.2rem; }
        /* Status badge */
        .status { font-size:0.72rem; font-weight:600; padding:0.2rem 0.6rem; border-radius:3px; text-transform:uppercase; letter-spacing:0.04em; white-space:nowrap; }
        .status-achieved { background:#ede9fe; color:#6d28d9; }
        .status-track    { background:#f0fdf4; color:var(--green); }
        .status-risk     { background:#fffbeb; color:var(--amber); }
        .status-behind   { background:#fef2f2; color:var(--red); }
        /* Progress */
        .progress-amounts { display:flex; justify-content:space-between; font-size:0.82rem; margin-bottom:0.4rem; }
        .prog-saved { font-weight:600; }
        .prog-target { color:var(--muted); }
        .prog-bg { background:#f0f0f0; border-radius:999px; height:6px; overflow:hidden; }
        .prog-fill { height:100%; border-radius:999px; transition:width 0.5s ease; }
        .fill-achieved { background:#7c3aed; }
        .fill-track    { background:var(--black); }
        .fill-risk     { background:var(--amber); }
        .fill-behind   { background:var(--red); }
        .prog-note { font-size:0.75rem; color:var(--muted); margin-top:0.35rem; }
        /* Deposit row */
        .action-row { display:flex; gap:0.6rem; align-items:center; padding-top:1rem; border-top:1px solid var(--border); margin-top:1rem; }
        .deposit-input { flex:1; padding:0.55rem 0.75rem; border:1px solid var(--border); border-radius:4px; font-size:0.88rem; font-family:'Syne',sans-serif; background:var(--bg); color:var(--black); transition:border-color 0.15s; }
        .deposit-input:focus { outline:none; border-color:var(--black); }
        .btn-deposit { padding:0.55rem 1rem; background:var(--black); color:var(--white); border:none; border-radius:4px; font-size:0.8rem; font-weight:500; font-family:'Syne',sans-serif; cursor:pointer; transition:opacity 0.15s; }
        .btn-deposit:hover { opacity:0.85; }
        .btn-delete { padding:0.55rem 0.9rem; background:var(--bg); color:var(--red); border:1px solid #fecaca; border-radius:4px; font-size:0.8rem; font-family:'Syne',sans-serif; cursor:pointer; transition:background 0.15s; }
        .btn-delete:hover { background:#fef2f2; }
        .empty-state { text-align:center; color:var(--muted); padding:3rem 0; font-size:0.88rem; }
        form { margin:0; }
    </style>
</head>
<body>
    <header>
        <span class="logo">FinTrack</span>
        <nav>
            <a th:href="@{/}">Dashboard</a>
            <a th:href="@{/income}">Income</a>
            <a th:href="@{/expense}">Expenses</a>
            <a th:href="@{/history}">History</a>
            <a th:href="@{/reports}">Reports</a>
            <a th:href="@{/insights}">Insights</a>
            <a th:href="@{/goals}" class="active">Goals</a>
            <a th:href="@{/logout}" class="danger">Logout</a>
        </nav>
    </header>
    <main>
        <p class="page-title">Smart Goals</p>
        <p class="page-sub">Track savings targets and get predictions on whether you will hit them.</p>

        <div class="add-card">
            <p class="section-label">New Goal</p>
            <form action="/goals" method="POST">
                <div class="add-grid">
                    <div class="fg">
                        <label for="goalName">Goal Name</label>
                        <input type="text" id="goalName" name="name" placeholder="Emergency Fund" required>
                    </div>
                    <div class="fg">
                        <label for="targetAmount">Target Amount (₹)</label>
                        <input type="number" id="targetAmount" name="targetAmount" placeholder="50000" step="0.01" min="1" required>
                    </div>
                    <div class="fg">
                        <label for="targetDate">Target Date</label>
                        <input type="date" id="targetDate" name="targetDate" required>
                    </div>
                </div>
                <button type="submit" class="btn-add">Add Goal</button>
            </form>
        </div>

        <div class="goals-list" th:if="${!#lists.isEmpty(goals)}">
            <div class="goal-card" th:each="goal : ${goals}">
                <div class="goal-top">
                    <div>
                        <div class="goal-name" th:text="${goal.name}">Goal</div>
                        <div class="goal-meta"
                             th:text="${goal.daysLeft + ' days left · target ' + #temporals.format(goal.targetDate, 'dd MMM yyyy')}">
                            90 days left
                        </div>
                    </div>
                    <span th:with="pred=${predictions[goal.id]}"
                          th:class="${'status ' +
                              (pred == 'Achieved' ? 'status-achieved' :
                               pred == 'On Track' ? 'status-track'    :
                               pred == 'At Risk'  ? 'status-risk'     : 'status-behind')}"
                          th:text="${pred}">Status</span>
                </div>

                <div class="progress-amounts">
                    <span class="prog-saved" th:text="${'₹' + #numbers.formatDecimal(goal.currentSaved, 1, 'COMMA', 0, 'POINT')}">₹0</span>
                    <span class="prog-target" th:text="${'of ₹' + #numbers.formatDecimal(goal.targetAmount, 1, 'COMMA', 0, 'POINT')}">of ₹0</span>
                </div>
                <div class="prog-bg">
                    <div th:with="pred=${predictions[goal.id]}"
                         th:class="${'prog-fill ' +
                             (pred == 'Achieved' ? 'fill-achieved' :
                              pred == 'On Track' ? 'fill-track'    :
                              pred == 'At Risk'  ? 'fill-risk'     : 'fill-behind')}"
                         th:style="${'width:' + goal.progressPercent + '%'}">
                    </div>
                </div>
                <div class="prog-note"
                     th:text="${#numbers.formatDecimal(goal.progressPercent, 1, 1) + '% complete — ₹' + #numbers.formatDecimal(goal.remaining, 1, 'COMMA', 0, 'POINT') + ' remaining'}">
                </div>

                <div class="action-row">
                    <form th:action="@{/goals/deposit/{id}(id=${goal.id})}" method="POST" style="display:flex;gap:0.5rem;flex:1;">
                        <input class="deposit-input" type="number" name="amount" placeholder="Add savings (₹)" step="0.01" min="0.01" required>
                        <button type="submit" class="btn-deposit">Add</button>
                    </form>
                    <form th:action="@{/goals/delete/{id}(id=${goal.id})}" method="POST"
                          onsubmit="return confirm('Delete this goal?');">
                        <button type="submit" class="btn-delete">Delete</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="empty-state" th:if="${#lists.isEmpty(goals)}">
            No goals yet. Add your first savings goal above.
        </div>
    </main>
</body>
</html>
