<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History | FinTrack</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --black:#0a0a0a; --white:#ffffff; --bg:#f5f5f5; --border:#e2e2e2; --muted:#737373; --card:#ffffff; --green:#16a34a; --red:#dc2626; }
        body { font-family:'Syne',sans-serif; background:var(--bg); color:var(--black); line-height:1.5; }
        header { background:var(--black); color:var(--white); padding:0 2.5rem; height:52px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:10; }
        .logo { font-size:0.95rem; font-weight:600; letter-spacing:-0.01em; }
        nav { display:flex; gap:0.25rem; }
        nav a { color:rgba(255,255,255,0.55); text-decoration:none; font-size:0.82rem; font-weight:500; padding:0.35rem 0.75rem; border-radius:4px; transition:color 0.15s,background 0.15s; }
        nav a:hover { color:var(--white); background:rgba(255,255,255,0.08); }
        nav a.active { color:var(--white); }
        nav a.danger { color:rgba(255,255,255,0.4); }
        nav a.danger:hover { color:#fca5a5; background:rgba(255,255,255,0.05); }
        main { max-width:960px; margin:2.5rem auto; padding:0 2rem; }
        .page-title { font-size:1rem; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:0.06em; margin-bottom:1.5rem; }
        /* Filter bar */
        .filter-bar { background:var(--card); border:1px solid var(--border); border-radius:6px; padding:1.25rem 1.5rem; margin-bottom:1rem; display:flex; gap:1rem; align-items:flex-end; }
        .fg { display:flex; flex-direction:column; }
        .fg label { font-size:0.72rem; font-weight:500; color:var(--muted); text-transform:uppercase; letter-spacing:0.06em; margin-bottom:0.35rem; }
        .fg input { padding:0.65rem 0.85rem; border:1px solid var(--border); border-radius:4px; font-size:0.88rem; font-family:'Syne',sans-serif; background:var(--bg); color:var(--black); transition:border-color 0.15s; }
        .fg input:focus { outline:none; border-color:var(--black); }
        .filter-btn { padding:0.65rem 1.25rem; background:var(--black); color:var(--white); border:none; border-radius:4px; font-size:0.82rem; font-weight:500; font-family:'Syne',sans-serif; cursor:pointer; transition:opacity 0.15s; }
        .filter-btn:hover { opacity:0.85; }
        /* Table */
        .table-card { background:var(--card); border:1px solid var(--border); border-radius:6px; overflow:hidden; }
        table { width:100%; border-collapse:collapse; }
        th,td { padding:0.75rem 1.25rem; text-align:left; font-size:0.88rem; border-bottom:1px solid var(--border); }
        th { font-size:0.72rem; font-weight:500; color:var(--muted); text-transform:uppercase; letter-spacing:0.06em; background:var(--bg); }
        tr:last-child td { border-bottom:none; }
        .badge { display:inline-block; padding:0.15rem 0.5rem; border-radius:3px; font-size:0.75rem; font-weight:500; text-transform:capitalize; }
        .badge-income  { background:#f0fdf4; color:var(--green); }
        .badge-expense { background:#fef2f2; color:var(--red); }
        .actions { display:flex; gap:0.4rem; }
        .actions form { margin:0; }
        .btn-edit   { padding:0.25rem 0.6rem; font-size:0.78rem; font-family:'Syne',sans-serif; border-radius:3px; cursor:pointer; text-decoration:none; display:inline-block; background:var(--bg); border:1px solid var(--border); color:var(--black); transition:border-color 0.15s; }
        .btn-edit:hover { border-color:#aaa; }
        .btn-delete { padding:0.25rem 0.6rem; font-size:0.78rem; font-family:'Syne',sans-serif; border-radius:3px; cursor:pointer; background:#fef2f2; border:1px solid #fecaca; color:var(--red); transition:background 0.15s; }
        .btn-delete:hover { background:#fecaca; }
        .empty-row td { text-align:center; color:var(--muted); padding:2.5rem; font-size:0.88rem; }
    </style>
</head>
<body>
    <header>
        <span class="logo">FinTrack</span>
        <nav>
            <a th:href="@{/}">Dashboard</a>
            <a th:href="@{/transaction}">Transactions</a>
            <a th:href="@{/history}" class="active">History</a>
            <a th:href="@{/reports}">Reports</a>
            <a th:href="@{/insights}">Insights</a>
            <a th:href="@{/goals}">Goals</a>
            <a th:href="@{/logout}" class="danger">Logout</a>
        </nav>
    </header>
    <main>
        <p class="page-title">Transaction History</p>

        <div class="filter-bar">
            <form action="/history" method="GET" style="display:flex;gap:1rem;align-items:flex-end;">
                <div class="fg">
                    <label for="startDate">From</label>
                    <input type="date" id="startDate" name="startDate" th:value="${startDate}">
                </div>
                <div class="fg">
                    <label for="endDate">To</label>
                    <input type="date" id="endDate" name="endDate" th:value="${endDate}">
                </div>
                <button type="submit" class="filter-btn">Filter</button>
            </form>
        </div>

        <div class="table-card">
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Description</th>
                        <th>Category</th>
                        <th>Type</th>
                        <th>Amount</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="tx : ${transactions}">
                        <td th:text="${#temporals.format(tx.date, 'dd MMM yyyy')}">01 Jan</td>
                        <td th:text="${tx.description}">—</td>
                        <td th:text="${tx.category}">—</td>
                        <td><span th:class="${'badge badge-' + tx.type}" th:text="${tx.type}">type</span></td>
                        <td th:text="${'₹' + #numbers.formatDecimal(tx.amount, 1, 'COMMA', 0, 'POINT')}">₹0</td>
                        <td>
                            <div class="actions">
                                <a th:href="@{/history/edit/{id}(id=${tx.id})}" class="btn-edit">Edit</a>
                                <form th:action="@{/history/delete/{id}(id=${tx.id})}" method="POST"
                                      onsubmit="return confirm('Delete this transaction?');">
                                    <button type="submit" class="btn-delete">Delete</button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(transactions)}" class="empty-row">
                        <td colspan="6">No transactions found in this period</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
</body>
</html>
