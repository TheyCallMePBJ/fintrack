<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Income | FinTrack</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --black:#0a0a0a; --white:#ffffff; --bg:#f5f5f5; --border:#e2e2e2; --muted:#737373; --card:#ffffff; }
        body { font-family:'Syne',sans-serif; background:var(--bg); color:var(--black); line-height:1.5; }
        header { background:var(--black); color:var(--white); padding:0 2.5rem; height:52px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:10; }
        .logo { font-size:0.95rem; font-weight:600; letter-spacing:-0.01em; }
        nav { display:flex; gap:0.25rem; }
        nav a { color:rgba(255,255,255,0.55); text-decoration:none; font-size:0.82rem; font-weight:500; padding:0.35rem 0.75rem; border-radius:4px; transition:color 0.15s,background 0.15s; }
        nav a:hover { color:var(--white); background:rgba(255,255,255,0.08); }
        nav a.active { color:var(--white); }
        nav a.danger { color:rgba(255,255,255,0.4); }
        nav a.danger:hover { color:#fca5a5; background:rgba(255,255,255,0.05); }
        main { max-width:480px; margin:2.5rem auto; padding:0 2rem; }
        .page-title { font-size:1rem; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:0.06em; margin-bottom:1.5rem; }
        .card { background:var(--card); border:1px solid var(--border); border-radius:6px; padding:2rem; }
        .form-group { margin-bottom:1.1rem; }
        .form-group label { display:block; font-size:0.75rem; font-weight:500; color:var(--muted); text-transform:uppercase; letter-spacing:0.05em; margin-bottom:0.4rem; }
        .form-group input { width:100%; padding:0.7rem 0.85rem; border:1px solid var(--border); border-radius:4px; font-size:0.95rem; font-family:'Syne',sans-serif; background:var(--bg); color:var(--black); transition:border-color 0.15s; }
        .form-group input:focus { outline:none; border-color:var(--black); }
        .btn-submit { width:100%; padding:0.75rem; background:var(--black); color:var(--white); border:none; border-radius:4px; font-size:0.9rem; font-weight:500; font-family:'Syne',sans-serif; cursor:pointer; margin-top:0.5rem; transition:opacity 0.15s; }
        .btn-submit:hover { opacity:0.85; }
    </style>
</head>
<body>
    <header>
        <span class="logo">FinTrack</span>
        <nav>
            <a th:href="@{/}">Dashboard</a>
            <a th:href="@{/income}" class="active">Income</a>
            <a th:href="@{/expense}">Expenses</a>
            <a th:href="@{/history}">History</a>
            <a th:href="@{/reports}">Reports</a>
            <a th:href="@{/insights}">Insights</a>
            <a th:href="@{/goals}">Goals</a>
            <a th:href="@{/logout}" class="danger">Logout</a>
        </nav>
    </header>
    <main>
        <p class="page-title">Log Income</p>
        <div class="card">
            <form action="/income" method="POST">
                <div class="form-group">
                    <label for="date">Date</label>
                    <input type="date" id="date" name="date" required>
                </div>
                <div class="form-group">
                    <label for="amount">Amount (₹)</label>
                    <input type="number" id="amount" name="amount" placeholder="0" step="0.01" required>
                </div>
                <div class="form-group">
                    <label for="category">Category</label>
                    <input list="incomeCats" id="category" name="category" placeholder="Select or type…" required>
                    <datalist id="incomeCats">
                        <option value="Salary"></option>
                        <option value="Freelance"></option>
                        <option value="Investment"></option>
                        <option value="Gift"></option>
                        <option value="Other"></option>
                    </datalist>
                </div>
                <div class="form-group">
                    <label for="description">Description (optional)</label>
                    <input type="text" id="description" name="description" placeholder="Add a note…">
                </div>
                <button type="submit" class="btn-submit">Save Income</button>
            </form>
        </div>
    </main>
</body>
</html>
