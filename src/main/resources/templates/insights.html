<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insights | FinTrack</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --black:#0a0a0a; --white:#ffffff; --bg:#f5f5f5; --border:#e2e2e2; --muted:#737373; --card:#ffffff; }
        body { font-family:'Syne',sans-serif; background:var(--bg); color:var(--black); line-height:1.5; }
        header { background:var(--black); color:var(--white); padding:0 2.5rem; height:52px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:10; }
        .logo { font-size:0.95rem; font-weight:600; letter-spacing:-0.01em; }
        nav { display:flex; gap:0.25rem; }
        nav a { color:rgba(255,255,255,0.55); text-decoration:none; font-size:0.82rem; font-weight:500; padding:0.35rem 0.75rem; border-radius:4px; transition:color 0.15s,background 0.15s; }
        nav a:hover { color:var(--white); background:rgba(255,255,255,0.08); }
        nav a.active { color:var(--white); }
        nav a.danger { color:rgba(255,255,255,0.4); }
        nav a.danger:hover { color:#fca5a5; background:rgba(255,255,255,0.05); }
        main { max-width:920px; margin:2.5rem auto; padding:0 2rem; }
        .page-title { font-size:1rem; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:0.06em; margin-bottom:0.4rem; }
        .page-sub { font-size:0.82rem; color:var(--muted); margin-bottom:1.75rem; }
        /* Insights */
        .section-label { font-size:0.72rem; font-weight:600; text-transform:uppercase; letter-spacing:0.07em; color:var(--muted); margin-bottom:0.75rem; }
        .insights-list { display:flex; flex-direction:column; gap:0.6rem; margin-bottom:2rem; }
        .insight-item {
            background:var(--card);
            border:1px solid var(--border);
            border-radius:6px;
            padding:1rem 1.25rem;
            font-size:0.9rem;
            line-height:1.55;
            transition:border-color 0.15s;
        }
        .insight-item:hover { border-color:#bbb; }
        /* Charts */
        .charts-row { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
        @media(max-width:640px){ .charts-row { grid-template-columns:1fr; } }
        .chart-card { background:var(--card); border:1px solid var(--border); border-radius:6px; padding:1.5rem; }
        .chart-card-label { font-size:0.72rem; font-weight:600; text-transform:uppercase; letter-spacing:0.07em; color:var(--muted); margin-bottom:1rem; }
        .chart-wrap { position:relative; height:220px; }
    </style>
</head>
<body>
    <header>
        <span class="logo">FinTrack</span>
        <nav>
            <a th:href="@{/}">Dashboard</a>
            <a th:href="@{/income}">Income</a>
            <a th:href="@{/expense}">Expenses</a>
            <a th:href="@{/history}">History</a>
            <a th:href="@{/reports}">Reports</a>
            <a th:href="@{/insights}" class="active">Insights</a>
            <a th:href="@{/goals}">Goals</a>
            <a th:href="@{/logout}" class="danger">Logout</a>
        </nav>
    </header>
    <main>
        <p class="page-title">Behaviour Analysis</p>
        <p class="page-sub">Detected patterns from your last 90 days of expenses.</p>

        <p class="section-label">Insights</p>
        <div class="insights-list">
            <div class="insight-item" th:each="insight : ${insights}" th:text="${insight}">Insight text.</div>
        </div>

        <div class="charts-row">
            <div class="chart-card">
                <div class="chart-card-label">Weekend vs Weekday</div>
                <div class="chart-wrap"><canvas id="weekendChart"></canvas></div>
            </div>
            <div class="chart-card">
                <div class="chart-card-label">Spending by Category</div>
                <div class="chart-wrap"><canvas id="categoryChart"></canvas></div>
            </div>
        </div>
    </main>
    <script th:inline="javascript">
        /*<![CDATA[*/
        var weekendTotal  = /*[[${weekendTotal}]]*/ 0;
        var weekdayTotal  = /*[[${weekdayTotal}]]*/ 0;
        var categoryTotals = /*[[${categoryTotals}]]*/ {};
        var monoColors = ['#0a0a0a','#404040','#737373','#a3a3a3','#d4d4d4','#262626','#525252','#8a8a8a'];

        new Chart(document.getElementById('weekendChart').getContext('2d'), {
            type:'doughnut',
            data:{ labels:['Weekends','Weekdays'], datasets:[{ data:[weekendTotal,weekdayTotal], backgroundColor:['#0a0a0a','#e2e2e2'], borderWidth:0, hoverOffset:4 }] },
            options:{ responsive:true, maintainAspectRatio:false, cutout:'68%',
                plugins:{ legend:{ position:'bottom', labels:{ font:{ family:'Outfit', size:12 }, padding:14 } },
                tooltip:{ callbacks:{ label:function(c){ return c.label+': ₹'+c.raw.toFixed(0); } } } } }
        });

        var catLabels = Object.keys(categoryTotals);
        var catValues = Object.values(categoryTotals);
        new Chart(document.getElementById('categoryChart').getContext('2d'), {
            type:'bar',
            data:{ labels:catLabels, datasets:[{ data:catValues, backgroundColor:catLabels.map(function(_,i){ return monoColors[i%monoColors.length]; }), borderRadius:3, borderWidth:0 }] },
            options:{ responsive:true, maintainAspectRatio:false,
                plugins:{ legend:{ display:false }, tooltip:{ callbacks:{ label:function(c){ return '₹'+c.raw.toFixed(0); } } } },
                scales:{ x:{ grid:{ display:false }, ticks:{ font:{ family:'Outfit', size:11 } } },
                         y:{ beginAtZero:true, grid:{ color:'#f0f0f0' }, ticks:{ callback:function(v){ return '₹'+v; }, font:{ family:'Outfit', size:11 } } } } }
        });
        /*]]>*/
    </script>
</body>
</html>
