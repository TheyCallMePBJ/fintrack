<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | FinTrack</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --black: #0a0a0a;
            --white: #ffffff;
            --bg: #f5f5f5;
            --border: #e2e2e2;
            --muted: #737373;
            --card: #ffffff;
        }
        body {
            font-family: 'Syne', sans-serif;
            background: var(--bg);
            color: var(--black);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .auth-wrap {
            width: 100%;
            max-width: 380px;
            padding: 1rem;
        }
        .brand {
            text-align: center;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            margin-bottom: 2rem;
            color: var(--black);
        }
        .auth-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 2.5rem 2rem;
        }
        .auth-card h2 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 1.75rem;
            letter-spacing: -0.01em;
        }
        .form-group {
            margin-bottom: 1.1rem;
        }
        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--muted);
            margin-bottom: 0.4rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .form-group input {
            width: 100%;
            padding: 0.7rem 0.85rem;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 0.95rem;
            font-family: 'Syne', sans-serif;
            background: var(--bg);
            color: var(--black);
            transition: border-color 0.15s;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--black);
        }
        .btn-primary {
            width: 100%;
            padding: 0.75rem;
            background: var(--black);
            color: var(--white);
            border: none;
            border-radius: 4px;
            font-size: 0.9rem;
            font-weight: 500;
            font-family: 'Syne', sans-serif;
            cursor: pointer;
            margin-top: 1.25rem;
            transition: opacity 0.15s;
        }
        .btn-primary:hover { opacity: 0.85; }
        .auth-link {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.82rem;
            color: var(--muted);
        }
        .auth-link a {
            color: var(--black);
            text-decoration: none;
            font-weight: 500;
        }
        .auth-link a:hover { text-decoration: underline; }
        .alert {
            margin-top: 1rem;
            padding: 0.65rem 0.85rem;
            border-radius: 4px;
            font-size: 0.85rem;
            background: #f5f5f5;
            border: 1px solid var(--border);
            color: var(--black);
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="auth-wrap">
        <div class="brand">FinTrack</div>
        <div class="auth-card">
            <h2>Sign in</h2>
            <form action="/login" method="POST">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn-primary">Sign In</button>
            </form>
            <div th:if="${param.error}" class="alert">Invalid username or password.</div>
        </div>
        <div class="auth-link">
            No account? <a th:href="@{/register}">Create one</a>
        </div>
    </div>
</body>
</html>
