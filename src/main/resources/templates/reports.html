<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports | FinTrack</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --black:#0a0a0a; --white:#ffffff; --bg:#f5f5f5; --border:#e2e2e2; --muted:#737373; --card:#ffffff; }
        body { font-family:'Syne',sans-serif; background:var(--bg); color:var(--black); line-height:1.5; }
        header { background:var(--black); color:var(--white); padding:0 2.5rem; height:52px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:10; }
        .logo { font-size:0.95rem; font-weight:600; letter-spacing:-0.01em; }
        nav { display:flex; gap:0.25rem; }
        nav a { color:rgba(255,255,255,0.55); text-decoration:none; font-size:0.82rem; font-weight:500; padding:0.35rem 0.75rem; border-radius:4px; transition:color 0.15s,background 0.15s; }
        nav a:hover { color:var(--white); background:rgba(255,255,255,0.08); }
        nav a.active { color:var(--white); }
        nav a.danger { color:rgba(255,255,255,0.4); }
        nav a.danger:hover { color:#fca5a5; background:rgba(255,255,255,0.05); }
        main { max-width:920px; margin:2.5rem auto; padding:0 2rem; }
        .page-title { font-size:1rem; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:0.06em; margin-bottom:1.5rem; }
        .chart-card { background:var(--card); border:1px solid var(--border); border-radius:6px; padding:2rem; }
        .chart-wrap { position:relative; height:380px; }
    </style>
</head>
<body>
    <header>
        <span class="logo">FinTrack</span>
        <nav>
            <a th:href="@{/}">Dashboard</a>
            <a th:href="@{/transaction}">Transactions</a>
            <a th:href="@{/history}">History</a>
            <a th:href="@{/reports}" class="active">Reports</a>
            <a th:href="@{/insights}">Insights</a>
            <a th:href="@{/goals}">Goals</a>
            <a th:href="@{/logout}" class="danger">Logout</a>
        </nav>
    </header>
    <main>
        <p class="page-title" th:text="${'Expense Report — ' + currentYear}">Expense Report</p>
        <div class="chart-card">
            <div class="chart-wrap">
                <canvas id="expenseChart"></canvas>
            </div>
        </div>
    </main>
    <script th:inline="javascript">
        /*<![CDATA[*/
        var labels = /*[[${labels}]]*/ [];
        var categoryData = /*[[${categoryData}]]*/ {};
        var colors = ['#0a0a0a','#404040','#737373','#a3a3a3','#d4d4d4','#262626','#525252','#8a8a8a','#b5b5b5','#e5e5e5'];
        var datasets = [];
        var i = 0;
        for (var cat in categoryData) {
            if (categoryData.hasOwnProperty(cat)) {
                datasets.push({ label: cat, data: categoryData[cat], backgroundColor: colors[i++ % colors.length], borderRadius: 3 });
            }
        }
        var ctx = document.getElementById('expenseChart').getContext('2d');
        new Chart(ctx, {
            type: 'bar',
            data: { labels: labels, datasets: datasets },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    x: { stacked: true, grid: { display: false }, ticks: { font: { family: 'Outfit', size: 11 } } },
                    y: { stacked: true, beginAtZero: true, grid: { color: '#f0f0f0' },
                         ticks: { callback: function(v){ return '₹'+v; }, font: { family: 'Outfit', size: 11 } } }
                },
                plugins: {
                    legend: { position: 'top', labels: { font: { family: 'Outfit', size: 12 }, padding: 16 } },
                    tooltip: { callbacks: { label: function(c){ return c.dataset.label+': ₹'+c.raw; } } }
                }
            }
        });
        /*]]>*/
    </script>
</body>
</html>
